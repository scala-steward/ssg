name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Zulu 25 — FFM API stable since JDK 22, all 6 desktop platforms
  # including Windows aarch64 (which Temurin 25 lacks).
  JAVA_VERSION: "25"
  JAVA_DISTRIBUTION: "zulu"
  NODE_VERSION: "22"

jobs:
  # ─── Scalafmt check ────────────────────────────────────────────────

  format:
    name: Scalafmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Check formatting
        run: sbt "scalafmtCheckAll; scalafmtSbtCheck"

  # ─── JVM tests (6 desktop platforms) ───────────────────────────────

  test-jvm:
    name: JVM tests (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-x86_64
            architecture: x64
          - os: macos-latest
            label: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
          - os: windows-11-arm
            label: windows-aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt
          architecture: ${{ matrix.architecture || '' }}

      - uses: sbt/setup-sbt@v1

      - name: Run JVM tests
        run: sbt test-jvm

  # ─── Scala.js tests (platform-independent, runs in Node.js) ────────

  test-js:
    name: Scala.js tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Scala.js tests
        run: sbt test-js

  # ─── Scala Native tests (5 desktop platforms) ─────────────────────

  test-native:
    name: Native tests (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-x86_64
            architecture: x64
          - os: macos-latest
            label: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt
          architecture: ${{ matrix.architecture || '' }}

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          sudo apt-get install -y libstdc++-12-dev || sudo apt-get install -y libstdc++-14-dev || true

      - name: Install Scala Native system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --yes

      - name: Run Scala Native tests
        run: sbt test-native

  # ─── re-scale enforce gate (covenant verify + shortcut budget) ──────
  #
  # Non-blocking initially: validates that every file with a `Covenant:`
  # header still passes (no method dropped, no shortcut introduced) and
  # that no new shortcut markers leaked into covenanted files.

  enforce:
    name: re-scale enforce
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Install re-scale
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/kubuszok/re-scale.git "$RUNNER_TEMP/re-scale"
          cd "$RUNNER_TEMP/re-scale"
          sbt install
          echo "$RUNNER_TEMP/re-scale/bin" >> "$GITHUB_PATH"

      - name: Print re-scale version
        run: re-scale version

      - name: Verify covenants on covenanted files
        continue-on-error: true
        run: |
          grep -rl 'Covenant:' --include='*.scala' . \
            | xargs -I{} re-scale enforce verify --file {}

      - name: Shortcut budget on covenanted files
        continue-on-error: true
        run: re-scale enforce shortcuts --covenanted
