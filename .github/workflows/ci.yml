name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Zulu 25 — FFM API stable since JDK 22, all 6 desktop platforms
  # including Windows aarch64 (which Temurin 25 lacks).
  JVM_VERSION: "zulu:25"
  JAVA_VERSION: "25"
  JAVA_DISTRIBUTION: "zulu"
  NODE_VERSION: "22"

jobs:
  # ─── Scalafmt check ────────────────────────────────────────────────

  format:
    name: Scalafmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - name: Check formatting
        run: sbt "scalafmtCheckAll; scalafmtSbtCheck"

  # ─── JVM tests (6 desktop platforms) ───────────────────────────────

  test-jvm:
    name: JVM tests (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-x86_64
            architecture: x64
          - os: macos-latest
            label: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
          - os: windows-11-arm
            label: windows-aarch64
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false

      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt
          architecture: ${{ matrix.architecture || '' }}

      - uses: sbt/setup-sbt@v1

      - name: Run JVM tests with coverage
        run: sbt ci-jvm-3

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: target/scala-3.8.4/scoverage-report/scoverage.xml
          flags: ${{ matrix.label }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Scala.js tests (platform-independent, runs in Node.js) ────────

  test-js:
    name: Scala.js tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Extract WASM and query files for tree-sitter
        run: |
          sbt 'ssg-highlightJS/update'
          WASM_JAR=$(find ~/Library/Caches/Coursier ~/.cache/coursier ~/.ivy2 \
            -name "wasm-provider-tree-sitter-*.jar" \
            -not -name "*-sources.jar" -not -name "*-javadoc.jar" 2>/dev/null | head -1)
          QUERY_JAR=$(find ~/Library/Caches/Coursier ~/.cache/coursier ~/.ivy2 \
            -name "tree-sitter-queries-*.jar" \
            -not -name "*-sources.jar" -not -name "*-javadoc.jar" 2>/dev/null | head -1)
          mkdir -p /tmp/ts-wasm/queries
          if [ -n "$WASM_JAR" ]; then
            echo "WASM JAR: $WASM_JAR"
            cd /tmp/ts-wasm && jar xf "$WASM_JAR" wasm/ && mv wasm/* . && rmdir wasm
            echo "Extracted $(ls grammars/*.wasm 2>/dev/null | wc -l) grammar WASM files"
          else
            echo "::warning::wasm-provider-tree-sitter JAR not found"
          fi
          if [ -n "$QUERY_JAR" ]; then
            echo "Query JAR: $QUERY_JAR"
            cd /tmp/ts-wasm && jar xf "$QUERY_JAR" queries/ && echo "Extracted $(find queries -name highlights.scm | wc -l) query files"
          else
            echo "::warning::tree-sitter-queries JAR not found"
          fi

      - name: Run Scala.js tests
        run: sbt ci-js-3
        env:
          TREE_SITTER_WASM_DIR: /tmp/ts-wasm

  # ─── Scala Native tests (5 desktop platforms) ─────────────────────

  test-native:
    name: Native tests (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-x86_64
            architecture: x64
          - os: macos-latest
            label: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false

      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt
          architecture: ${{ matrix.architecture || '' }}

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libc++-dev

      - name: Install Scala Native system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --yes

      - name: Run Scala Native tests
        run: sbt ci-native-3

  # ─── re-scale enforce gate (covenant verify + shortcut budget) ──────
  #
  # Non-blocking initially: validates that every file with a `Covenant:`
  # header still passes (no method dropped, no shortcut introduced) and
  # that no new shortcut markers leaked into covenanted files.

  enforce:
    name: re-scale enforce
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - name: Install Scala Native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Install re-scale
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/kubuszok/re-scale.git "$RUNNER_TEMP/re-scale"
          cd "$RUNNER_TEMP/re-scale"
          sbt install
          echo "$RUNNER_TEMP/re-scale/bin" >> "$GITHUB_PATH"

      - name: Print re-scale version
        run: re-scale version

      - name: Verify covenants on covenanted files
        continue-on-error: true
        run: |
          grep -rl 'Covenant:' --include='*.scala' . \
            | xargs -I{} re-scale enforce verify --file {}

      - name: Shortcut budget on covenanted files
        continue-on-error: true
        run: re-scale enforce shortcuts --covenanted
