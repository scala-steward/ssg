name: Sonatype Release

on:
  push:
    branches: [master]
    tags: ["*"]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JVM_VERSION: "zulu:25"

jobs:
  build-and-publish:
    # Never publish from pull requests (no secrets, and would otherwise attempt a snapshot deploy).
    # The pull_request trigger was removed so this workflow no longer runs on PRs at all;
    # this guard is retained as defense-in-depth.  Snapshots publish on master pushes; full
    # releases (sonaRelease) only on tag pushes — the tag/snapshot distinction is made inside
    # the `ci-release` command (publishSigned vs +publishSigned + sonaRelease).
    if: github.event_name != 'pull_request'
    runs-on: macos-latest

    name: ${{ startsWith(github.ref, 'refs/tags/') && 'Publish Tag as Release' || 'Publish Snapshot' }}

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - uses: coursier/cache-action@v8
      - name: Import GPG key for signing the release
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt
      - name: Publish all projects
        run: sbt ci-release
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
